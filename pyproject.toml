[project]
name = "usechange"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Edward Boswell", email = "thememium@gmail.com" }]
requires-python = ">=3.10"
dependencies = []

[project.scripts]
usechange = "usechange:main"
change = "usechange:main"

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
  "deptry>=0.24.0",
  "isort>=7.0.0",
  "poethepoet>=0.41.0",
  "pytest>=9.0.2",
  "ruff>=0.15.1",
  "ty>=0.0.17",
]

[tool.poe.tasks]
dev = "uv run usechange"
clean-full = "sh -c 'uv run isort . && uv run ruff check . && uv run ruff format . && uv run deptry . && uv run ty check'"
clean = "sh -c 'uv run isort . && uv run ruff format .'"
test = "uv run pytest tests/ -v"
sort = "uv run isort ."
lint = "uv run ruff check ."
format = "uv run ruff format ."
deptry = "uv deptry ."
typecheck = "uv run ty check"
release = "bash scripts/release.sh"
