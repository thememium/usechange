[project]
name = "usechange"
version = "0.1.0"
description = "Generate Beautiful Changelogs using Conventional Commits"
readme = "README.md"
authors = [{ name = "Edward Boswell", email = "thememium@gmail.com" }]
requires-python = ">=3.10"
dependencies = [
  "case-converter>=1.2.0",
  "click>=8.3.1",
  "fzf-bin>=0.67.0",
  "jinja2>=3.1.6",
  "pyyaml>=6.0.3",
  "rich>=14.3.2",
  "simple-term-menu>=1.6.6",
  "typer>=0.23.1",
]

[project.scripts]
usechange = "usechange:run_app"
change = "usechange:run_app"

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
  "deptry>=0.24.0",
  "isort>=7.0.0",
  "poethepoet>=0.41.0",
  "pytest>=9.0.2",
  "ruff>=0.15.1",
  "ty>=0.0.17",
]

[tool.poe.tasks]
dev = "uv run usechange"
clean-full = "sh -c 'uv run isort . && uv run ruff check . && uv run ruff format . && uv run deptry . && uv run ty check'"
clean = "sh -c 'uv run isort . && uv run ruff format .'"
test = "uv run pytest tests/ -v"
sort = "uv run isort ."
lint = "uv run ruff check ."
format = "uv run ruff format ."
deptry = "uv deptry ."
typecheck = "uv run ty check"
release = "bash scripts/release.sh"
